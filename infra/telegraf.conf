# Telegraf configuration — PS13 MPLS telemetry collection
# Polls routers via SNMP and exports to Prometheus

[agent]
  interval          = "5s"
  round_interval    = true
  metric_batch_size = 1000
  flush_interval    = "5s"
  hostname          = "ps13-telegraf"

# ── Output: Prometheus ──────────────────────────────────────────────────────
[[outputs.prometheus_client]]
  listen = ":9273"
  metric_version = 2

# ── Input: SNMP — CORE router ───────────────────────────────────────────────
[[inputs.snmp]]
  agents         = ["udp://10.0.0.1:161"]
  version        = 2
  community      = "ps13_ro"
  name           = "mpls_router"
  [inputs.snmp.tags]
    device = "CORE-01"

  [[inputs.snmp.field]]
    name  = "cpu_utilization"
    oid   = "1.3.6.1.4.1.9.2.1.58.0"   # Cisco CPU OID
  [[inputs.snmp.field]]
    name  = "mem_utilization"
    oid   = "1.3.6.1.4.1.9.9.48.1.1.1.5.1"
  [[inputs.snmp.field]]
    name  = "uptime"
    oid   = "1.3.6.1.2.1.1.3.0"

# ── Input: SNMP — PE-02 (critical) ─────────────────────────────────────────
[[inputs.snmp]]
  agents         = ["udp://10.0.1.2:161"]
  version        = 2
  community      = "ps13_ro"
  name           = "mpls_router"
  [inputs.snmp.tags]
    device = "PE-02"

  [[inputs.snmp.field]]
    name = "cpu_utilization"
    oid  = "1.3.6.1.4.1.9.2.1.58.0"
  [[inputs.snmp.field]]
    name = "mem_utilization"
    oid  = "1.3.6.1.4.1.9.9.48.1.1.1.5.1"

  # Interface Gi0/1 stats
  [[inputs.snmp.table]]
    name             = "mpls_interfaces"
    inherit_tags     = ["device"]
    [[inputs.snmp.table.field]]
      name = "if_in_octets"
      oid  = "1.3.6.1.2.1.2.2.1.10"
    [[inputs.snmp.table.field]]
      name = "if_out_octets"
      oid  = "1.3.6.1.2.1.2.2.1.16"
    [[inputs.snmp.table.field]]
      name = "if_in_errors"
      oid  = "1.3.6.1.2.1.2.2.1.14"

# ── Input: Syslog ───────────────────────────────────────────────────────────
[[inputs.syslog]]
  server    = "tcp://:6514"
  keep_alive_period = "5m"
  [inputs.syslog.tags]
    source = "network_device"

# ── Processor: MPLS tunnel metrics computed from SNMP counters ──────────────
[[processors.starlark]]
  source = '''
def apply(metric):
    # Compute packet loss ratio from error counters
    in_oct = metric.fields.get("if_in_octets", 0)
    in_err = metric.fields.get("if_in_errors", 0)
    if in_oct > 0:
        metric.fields["packet_loss_pct"] = (in_err / in_oct) * 100
    return metric
'''
